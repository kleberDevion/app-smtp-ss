<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="email-compose.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Envio(Inbox) - ss</title>
  </head>
  <body>

    <div class="body-items">

    </div>

    <div class="mov-body">
     <nav class="bar">
        <h4>Criar nova menssagem</h4>
        <input type="file" accept="image/*" id="input-file" style="display: none;">
        <button type="button" id="btn-setimg" title="Upload de arquivo">
          <i class="fas fa-file"></i>
        </button>
      </nav>
      <form id="formSmtp"> 

        <input type="email" id="destinatario" placeholder="Para">

        <input type="text" id="assunto" placeholder="Assunto">

        <textarea id="corpo" contenteditable="true"></textarea>

        <button type="submit" id="buttonSender" form="formSmtp"> 
          <i class="fas fa-paper-plane"></i>
        </button>

      </form>
    </div>

    <nav class="menu-email">
      <div class="logo-body">
        <div class="logo">

        </div>
        <input type="search" id="search-input" placeholder="Pesquisar..." autocomplete="off">
      </div>
      <div class="workspace" onclick="redirectInbox()">
        <div style="width: auto; height: auto; display: flex; gap: 10px; align-items: center;">
         <i class="ri-bar-chart-horizontal-line"></i>
         <h5 style="font-size: 12px;">Workspace [Emails]</h5>
        </div>
        <a  href="smtp-envio.html" style="display: block; width: 100%; height: 100%; text-decoration: none; z-index: 9999; position: relative;">
        <div class="sistema-route" onclick="console.log('Clicou!'); window.location.href = './smtp-envio.html';">
          <div style="width: auto; height: auto; display: flex; gap: 10px; align-items: center;">
            <i class="ri-bar-chart-horizontal-line"></i>
            <h5 style="font-size: 12px;">Workspace [Manager]</h5>
          </div>
        </div>
        </a>
      </div>
    <div class="auxiliar-menu">
      <div class="inbox" onclick="redirectInbox()">
        <i class="fas fa-inbox" style="font-size: 13px; color: #2196f7;"></i>
        <h5 style="font-size: 12px;">inbox</h5>
      </div>
      <div class="sent" onclick="redirectEnviados()">
        <i class="ri-mail-send-line" style="font-size: 15px; color: #2196f7;"></i>
        <h5 style="font-size: 12px;">Enviados</h5>
      </div>
      <div class="sent-later" onclick="redirectEnviardepois()">
        <i class="ri-record-mail-line" style="font-size: 15px; color: #2196f7;"></i>
        <h5 style="font-size: 12px;">Enviar depois</h5>
      </div>
      <div class="sent-mail" onclick="redirectEnviaremail()">
        <i class="ri-inbox-unarchive-line" style="font-size: 15px; color: #2196f7;"></i>
        <h5 style="font-size: 12px;">Enviar email</h5>
      </div>
    </div>
    </nav>
  </body>
  <script>

    const btnOpen = document.querySelector('#send-mail');
    const targetEl = document.querySelector('#formSmtp');
    const barON = document.querySelector('.bar');
    const seiLa = document.querySelector('.mov-body');


const barraDeArrasto = document.querySelector('.bar');
const modal = document.querySelector('.mov-body');

let isDragging = false;
let offset = { x: 0, y: 0 };

barraDeArrasto.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'I') return;

    isDragging = true;

    const rect = modal.getBoundingClientRect();
    offset.x = e.clientX - rect.left;
    offset.y = e.clientY - rect.top;

    modal.style.transform = 'none';
    modal.style.left = rect.left + 'px';
    modal.style.top = rect.top + 'px';
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    modal.style.left = (e.clientX - offset.x) + 'px';
    modal.style.top = (e.clientY - offset.y) + 'px';
});

document.addEventListener('mouseup', () => {
    isDragging = false;
});

  
window.addEventListener('keydown', (e) => {
   
    if (e.ctrlKey && e.key.toLowerCase() === 'o') {
        e.preventDefault(); 
        
        targetEl.classList.toggle('ativa');
        barON.classList.toggle('ativa');
        seiLa.classList.toggle('ativa');
    
        if (targetEl.classList.contains('ativa')) {
            document.querySelector('#destinatario').focus();
        }
    }

});



   function redirectEnviardepois() {
    window.location.href = './enviar-depois.html';
  }

  
  function redirectInbox() {
    window.location.href = './inbox.html';
  }

  function redirectEnviaremail() {
    window.location.href = './enviar-email.html';
  }

  
  function redirectEnviados() {
    window.location.href = './enviados.html';
  }
    
  const conteinerDados = document.querySelector('.body-items');

  let dadosGlobal = [];

  async function buscarDados() {
    try {
      const response = await fetch(`http://localhost:5500/api/buscar/inbox`, {
        method: 'GET',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': localStorage.getItem('token_acesso')
        },
      });

      if (response.status === 404) { console.warn('Dados não encontrados.'); return; }
      if (response.status === 500) { console.error('Erro no servidor 500.'); return; }

      const resultado = await response.json();
      dadosGlobal = Array.isArray(resultado) ? resultado : [resultado];

      const htmlContent = dadosGlobal.map(dados => `
       <div id="item${dados.id}" class="mail-list-div">
         <i class="fas fa-inbox" style="font-size: 13px; color: #2196f7;"></i>
         <p  onclick="abrirEmail('${dados.id}')" style="padding-right: 10px; border-left: 2px solid #2196f7; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; border-right: 1px solid #2196f7; border-radius: 5px; height: 100%; display: flex; align-items: center; padding-left: 10px;">De: [${dados.nome || 'Nao informado'} |  ${dados.remetente || 'Nao informado'}] | Para: [${dados.destinatario || 'Nao informado'}]ㅤㅤㅤㅤㅤㅤ | Horario: ${dados.data_envio}</p>
          <button type="button" data-id="${dados.id}" class="btn-delete" onclick="deletarItem('${dados.id}')" style="cursor: pointer; border: 1px solid #ccc; border-radius: 2px; padding: 3px; color: #afafaf; position: absolute; right: 10px; z-index: 1000;">
             <i class="fas fa-trash"></i>
          </button>
       </div>
      `).join('');
      conteinerDados.innerHTML = htmlContent;

    } catch (error) {
      console.error('Erro na requisição:', error);
       conteinerDados.innerHTML = '<p style="text-align: center; color: gray;">Erro desconhecido, olhe o console.</p>';
    }
  }

   function abrirEmail(id) {
    const itemEncontrado = dadosGlobal.find(item => item.id == id);

    if (itemEncontrado) {
      localStorage.setItem('email_selecionado', JSON.stringify(itemEncontrado));
         window.location.href =  `./visualizar-item.html?id=${id}`;
    }
  }


window.addEventListener('DOMContentLoaded', buscarDados);

async function deletarItem(id) {
  if (!confirm('Deseja excluir essa desgraça?')) return;

  try {
    const res = await fetch(`http://localhost:5500/api/deletar/${id}`, { 
      method: 'DELETE' 
    });

    if (res.ok) {
      const elemento = document.getElementById(`item${id}`);
      if (elemento) elemento.remove();
    } else {
      alert('Erro ao deletar no servidor.');
    }
  } catch (err) {
    console.error('Erro na requisição:', err);
  }
}

const form = document.querySelector('#formSmtp');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    destinatario: document.querySelector('#destinatario').value,
    assunto: document.querySelector('#assunto').value,
    corpo: document.querySelector('#corpo').value
  };

  try {
    const response = await fetch('http://localhost:2200/api/enviar/email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    
    if (response.ok) {
      alert(result.sucesso);
      form.reset();
    } else {
      alert('Erro: ' + result.erro);
    }
  } catch (error) {
    console.log(error);
    alert('Erro: Erro na requisição');
  }
});

const token = localStorage.getItem('token_acesso');

if (!token) {
    alert("Acesso negado! Faça login primeiro.");
    window.location.href = "./login.html";
}


</script>

</html>
