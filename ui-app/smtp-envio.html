<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="style.envio-smtp.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ss-smtp.com</title>
</head>
<body>
  
  <header class="topo">
     <div class="title-body">
       <h2 class="title">SS-SENDER</h2>
       <i class="ri-mail-send-line" style="color: #4285f4; font-size: 25px; font-weight: bold;"></i>
     </div>
      <div class="openModal-body">
       <button class="open-modal" onclick="openEmailSender()" title="Enviar email">
         <i class="ri-mail-send-line" style="color: #4285f4; font-weight: bold; font-size: 20px;"></i>
       </button>
      </div>
      <button class="perfil-user" title="Ver dados gerais da sua conta." onclick="">
        <i class="fas fa-user" style="color: #fff; font-size: 20px; color: #4285f4"></i>
      </button>
  </header>

  <div class="menu"> 
    <select class="pages" aria-valuetext="Dashboards" onchange="if (this.value) window.location.href = this.value;">
      <option value="./resultados-emails.html">Dashboard visao geral </option>
      <option value="./dashboard.html">Dashbboard main <i class="fas fa-chart-line" style="font-size: 17px; color: #2196f7; margin-top: px; "></i></option>
      <option value="./manager.html">Dashboard envios falhos <i class="fas fa-server" style="font-size: 17px; color: #2196f7; margin-top: px;"></i></option>
      <option value="./inbox.html">Envio de emails<i class="fas fa-server" style="font-size: 17px; color: #2196f7; margin-top: px;"></i></option>
       <option value="./home-chat.html">Chat<i class="fas fa-ser" style="font-size: 17px; color: #2196f7; margin-top: px;"></i></option>    
    </select>
   <div class="control">
    <button type="button" class="log-out" onclick="logout()" title="Sair">
      <i class="fas fa-sign-out"></i>
     </button>
      <div id="user-name" title="Seu nome de usuario"></div> 
   </div>
  </div>

  <!--ITEMS QUE NAO SOMEN, AO USAR O TOGGLE.MODE-->

  <form id="formSmtp">
    <div class="div-form">
      <button type="button" class="close-form" onclick="closeForm()" title="Fechar formulario de envio">
           <i class="fas fa-sign-out" style="color: #fff; font-size: 12px;"></i>
      </button>
      <div class="corpo-inputs"> 
         <input type="text" id="nome" placeholder="Seu nome">
         <input type="text" id="remetente" placeholder="Seu email">
         <input type="text" id="destinatario" placeholder="Email do destinatario">
         <input type="text" id="senha_app" placeholder="Sua senha de app">
         <textarea type="text" id="assunto" placeholder="Seu assunto"></textarea>
      <select id="template">
        <option value="">Selecione um Template</option>
        <option value="template1">Boas-vindas</option>
        <option value="template2">Promoção</option>
        <option value="vazio">Texto Puro</option>
      </select>
      </div>
      <button class="submit" type="submit" form="formSmtp">
         <h4 class="text-send-form">Enviar email</h4>
         <i class="fas fa-paper-plane" style="color: #fff; font-size: 12px; object-fit: fill;" title="Enviar template"></i>
      </button>
    </div>
    <div id="preview-container"></div>
  </form>

<div class="page-home">
   <div class="profile-items">
     <div class="search-bar">
      <i class="fas fa-search">
      </i>
      <input type="search" id="search-input" placeholder="Pesquisar..." autocomplete="off">
     </div>
   </div>
 
     <div class="content-profile">
       <div class="card-dash">
        <div id="results" class="results-list"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
       </div>
     </div>
</div>

<footer class="rodape"></footer>
  
<script>


const card_name = document.getElementById('user-name');

function carregarNome() {
    const nomeSalvo = localStorage.getItem('userName');
    if (nomeSalvo) {
        card_name.innerText = nomeSalvo;
    }
}

const input = document.getElementById('search-input');
const resultsDiv = document.getElementById('results');

input.addEventListener('input', async (e) => {
  const query = e.target.value;
  console.log('clicouooooo')

   const isNumber = query.length > 0 && !isNaN(query);

  if (query.length === 0 || (query.length < 2 && isNaN(query))) { 
    resultsDiv.innerHTML = '';
    return;
  }

  const response = await fetch(`http://localhost:5500/ss/buscar/envios?q=${query}`);
  const data = await response.json();

  resultsDiv.innerHTML = data.map(item => `
    <div style="background: #1a1f2e; width: 100%; height: 30px; align-items: center; padding-left: 10px; color: green; border-bottom: 2px solid #ccc; padding-top: 3px;">ID De numero: ${item.id}</div>
    <div style="width: 100%; height: 60px; border: 2px solid #ccc; display: flex; flex-direction: column; bottom: 0; background: #fff; color: #000; font-weight: bold;">
      <h5 style="padding-left: 10px;">Remetente</h5>
      <div style="background: whitesmoke; width: 100%; height: 30px; color: #205266; padding-left: 10px; border: none; display: flex; bottom: 0; align-items: center;">${item.remetente}</div>
    </div>
  `).join('');
});


function openEmailSender() {
  const form = document.querySelector('#formSmtp');
  form.classList.toggle('ativado');
}

function closeForm() {
  const button = document.querySelector('#formSmtp');
  button.classList.toggle('ativado');
}


function redirectUser() {
  window.location.href = './dashboard.html';
}
function redirectUser() {
  window.location.href = './home-chat.html';
}
  
const menu = document.querySelector('.menu');

menu.addEventListener('click', () => {
  menu.classList.toggle("ativo");
});

const htmlrender = {
  template1: `
    <div style="font-family: Arial; border: 1px solid #4285f4; border-radius: 10px; overflow: hidden; width: 100%; height: 100%; background: #fff;">
      <div style="background: #4285f4; color: white; padding: 15px; text-align: center;">
        <h2 style="margin:0;">Bem-vindo!</h2>
      </div>
      <div style="padding: 20px; color: #333;">
        <p>Olá! Ficamos muito felizes em ver você por aqui.</p>
        <button style="background: #4285f4; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Acessar Conta</button>
      </div>
    </div>`,
  
  template2: `
    <div style="font-family: Arial; border: 2px solid #f4c20d; padding: 20px; text-align: center; background-color: #fffde7; width: 100%; height; 100%;">
      <h1 style="color: #db4437;">🔥 OFERTA EXCLUSIVA 🔥</h1>
      <p style="font-size: 18px;">Você ganhou <strong>50% de desconto</strong> no seu próximo envio!</p>
      <div style="background: #db4437; color: white; padding: 10px; display: inline-block; font-weight: bold; ">CUPOM: ESTUDANTE10</div>
    </div>`
};

const selectElement = document.getElementById('template');
const previewContainer = document.getElementById('preview-container');

selectElement.addEventListener('change', (e) => {
    const selectedKey = e.target.value;
    
    if (selectedKey && htmlrender[selectedKey]) {

        previewContainer.innerHTML = htmlrender[selectedKey];
    } else {
        previewContainer.innerHTML = '';
    }
});

const form = document.querySelector('#formSmtp');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const templateKey = document.querySelector('#template').value;
  
  const htmlContent = htmlrender[templateKey] || "sem conteudo..";

  const data = {
    nome: document.querySelector('#nome').value,
    remetente: document.querySelector('#remetente').value,
    destinatario: document.querySelector('#destinatario').value,
    senha_app: document.querySelector('#senha_app').value,
    assunto: document.querySelector('#assunto').value,
    template: htmlContent
  };

  try {
    const response = await fetch('http://localhost:5500/ss/enviar/envios', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    
    if (response.ok) {
      alert('Sucesso: Email enviado com sucesso!');
      form.reset();
    } else {
      alert('Erro: ' + result.erro);
    }
  } catch (error) {
    console.log(error);
    alert('Erro: Erro na requisição');
  }
});

const token = localStorage.getItem('token_acesso');

window.onload = () => {
    const token = localStorage.getItem('token_acesso');
    if (!token) {
        alert("Acesso negado! Faça login primeiro.");
        window.location.href = './login.html';
    }
};

function logout() {
    localStorage.removeItem('token_acesso');
    window.location.href = './login.html';
}

carregarNome();

  </script>
</body>
</html>
