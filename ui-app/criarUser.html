<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="criarUser.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar usuario</title>
</head>
<body>
   <div class="acople-form">
      <form id="formlogin">
        
        <label name="name">Nome de login</label>
        <input type="text" id="nome" name="user-name">

        <label name="user-password">Senha de acesso</label>
        <input type="password" id="senha" name="user-password" autocomplete="off">

        <label name="mail">Seu email</label>
        <input type="email" id="email" name="mail" autocomplete="on">

        <button type="submit" form="formlogin" class="sender-btn">
            Criar
            <i class="fas fa-user"></i>
        </button>
        <p class="criar-conta" onclick="window.location.href = 'login.html'";>Ja tem uma conta ?, <a href="./login.html" style=" color: aqua;font-size: 17px;font-weight: bold;display: flex;align-items: center;justify-content: center;cursor: pointer;">Faça login.</a></p>
      </form>
   </div>
   <div class="img-ss">
     <div class="logo"></div>
    <div class="introducao">
        <h2 id="s-crie">Crie uma conta</h2>
        <h4 id="s-text">para usar nosso serviço</h4>
    </div>
     <div class="img"></div>
      <div class="circle"></div>
   </div>
   <script>

const formLogin = document.querySelector('#formlogin');

formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();

    const data = {
      nome: document.querySelector('#nome').value,
      senha: document.querySelector('#senha').value,
      email: document.querySelector('#email').value
    };

// mantem.
    if (!data) {
        alert("Preencha tudo!");
        return;
    }

    const response = await fetch('http://localhost:5500/api/criar/usuario', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    if (response.ok) {  
       alert("Usuario criado, va para login");
       window.location.href = './login.html';
    }  else {
       alert('Erro: ' + (response.erro || 'Erro desconhecido'));
    }

});

   </script>
</body>
</html>
