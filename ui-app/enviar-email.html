const form = document.querySelector('#formSmtp');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    destinatario: document.querySelector('#destinatario').value,
    assunto: document.querySelector('#assunto').value,
    corpo: document.querySelector('#corpo').value
  };

  try {
    const response = await fetch('http://localhost:2200/api/enviar/email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    
    if (response.ok) {
      alert(result.sucesso);
      form.reset();
    } else {
      alert('Erro: ' + result.erro);
    }
  } catch (error) {
    console.log(error);
    alert('Erro: Erro na requisição');
  }
});
