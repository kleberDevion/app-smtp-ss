<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat.ss | ss.com</title>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(71, 71, 71);
        overflow-x: hidden;
        overflow-y: hidden;
        font-family: 'Poppins';
        width: 100vw;
        height: 100vh;
    }

    body::-webkit-scrollbar {
        display: none;
    }

    #topo {
        width: 86%;
        height: 50px;
        background: #111425;
        display: flex;
        position: absolute;
        right: 0;
    }

    #grupos {
        width: 14%;
        height: 100%;
        border: 2px solid #232323;
        display: flex;
        flex-direction: column;
        background: #232323;
        position: absolute;
        gap: 3px;
    }

    #top {
        width: 14%;
        height: 49px;
        background: #111425;
        display: flex;
        border-right: 2px solid #413f3f;
    }

    #footer-editor {
        width: 86%;
        height: 60px;
        background: #232323;
        display: flex;
        position: absolute;
        bottom: 0;
        right: 0;
        flex-direction: row;
        gap: 10px;
        border-left: 1px solid #413f3f;
    }

    #formMsg {
        width: auto;
        height: 100%;
        display: flex;
        align-items: center;
    }

    #editor-msg {
       width: 1500px;
       height: 40px;
       border-radius: 20px;
       padding-left: 20px;
       position: absolute;
       left: 210px;
       outline: none;
    }

    #chat-camp {
        width: 86%;
        height: 89%;
        display: flex;
        position: absolute;
        right: 0;
        bottom: 60px;
        border: none;
        padding-left: 20px;
        padding-top: 20px;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
        scroll-behavior: auto;
        overflow-y: auto;
    }

    #chat-camp::-webkit-scrollbar {
        display: none;
    }

    #send-msg {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #232323;
        display: flex;
        position: absolute;
        right: 30px;
        align-items: center;
        justify-content: center;
        padding-right: 3px;
        color: #fff;
        cursor: pointer;
    }

    #box {
        width: 50px;
        height: 30px;
        display: flex;
        position: absolute;
        border-top-left-radius: 7px;
        border-bottom-right-radius: 7px;
        border-bottom: 1px solid aqua;
        left: 96.7%;
        bottom: 10px;
        z-index: -1;
        transition: bottom 0.4s ease;
        pointer-events: none;
        transition: all 0.4s ease;
        font-size: 12px;
        align-items: center;
        justify-content: center;
    }

    .box-ativa {
       transform: translateY(-70px);
       color: #fff;
       background: #111425;
    }
</style>

     <header id="topo">

     </header>
     <div id="chat-capm">

        <div id="chat-camp"></div>

        <div id="footer-editor">
            <form id="formMsg">
                <input type="text" id="editor-msg" placeholder="Mandar menssagem..." autocomplete="off">
                <button type="button" id="send-msg" form="formMsg">
                    <i class="fas fa-paper-plane" style="transform: rotateZ(46deg);"></i>
                </button>
            </form>
        </div>
     </div>
      <div id="top"></div>
     <nav id="grupos">

     </nav>

<!--fezes-->
<div id="box">
  <div class="title">
    <p>Enviar</p>
  </div>
</div>
<!--fezes-->
<script>

const socket = io("http://127.0.0.1:5507");
const chatCamp = document.getElementById('chat-camp');
const sidebar = document.getElementById('grupos');
const formMsg = document.getElementById('formMsg');

const aviso = `
 <div id="aviso" style="color: lime; display: flex; width: auto; height: auto; position: absolute; left: 42%; top: 50%; flex-direction: column; align-items: center; gap: 30px;">
      <i class="ri-chat-check-line" style="font-size: 60px; color: #fff;"></i>
      <p>Selecione uma conversa</p>
   </div>
`;

function criarCardLateral(data) {
    const idUnico = data.email_user.replace(/[@.]/g, '');
    const idDoCard = `popup-${idUnico}`; 

    if (document.getElementById(idDoCard)) return;

    const htmlCard = `
        <div id="${idDoCard}" style="width: 100%; height: 70px; border: 1px solid #535151; padding-left: 8px; background: #232323; display: flex; align-items: center; position: relative; cursor: pointer; margin-bottom: 5px;">
          <div style="width: 50px; height: 50px; border-radius: 50%; border: 1px solid #535151; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-user" style="color: white;"></i>
          </div>
          <div style="margin-left: 10px; color: #fff; font-size: 14px;">${data.user_name}</div>
          <div style="width: 40px; display: flex; justify-content: center; color: #fff; position: absolute; right: 5px; font-size: 10px; bottom: 5px; border-top-left-radius: 5px; border: 1px solid aqua;">
              ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
          </div>
        </div>
    `;

    sidebar.insertAdjacentHTML('beforeend', htmlCard);

    document.getElementById(idDoCard).onclick = () => {
        window.conversaAtivaEmail = data.email_user;
        chatCamp.innerHTML = ""; 
        buscarMensagens();
    };
}

async function buscarMensagens() {
    try {
        const response = await fetch('http://localhost:5507/tunnek/msg');
        const resultado = await response.json();
        let dadosGlobal = Array.isArray(resultado) ? resultado : [resultado];

        const mensagensFiltradas = dadosGlobal.filter(m => m.email_user === window.conversaAtivaEmail);

        if (mensagensFiltradas.length === 0) {
            chatCamp.innerHTML = aviso;
            return;
        }

        chatCamp.innerHTML = mensagensFiltradas.map(dados => {
    
         if (dados.is_dev) {
            return `
              <div style="width: auto; height: auto; display: flex; gap: 7px; flex-direction: column; margin-bottom: 20px; align-self: flex-start;">
              <div style="width: 100%; height: auto; background: #111425; border-top: 3px solid #2196f7; display: flex; flex-direction: column; color: #fff; border-bottom-left-radius: 7px; gap: 5px; padding-top: 4px;">
                <div style="width: 100%; height: 25px; display: flex; flex-direction: row; gap: 1px; align-items: center; padding-left: 4px;">
                    <h4 style="width: 20px; height: 20px; border-radius: 50%; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; margin: 0;"></h4>
                    <p style="font-weight: bold; color: gold; margin-left: 10px; font-size: 10px;">${dados.user_name}</p>
                </div>
                <span style="width: 100%; min-width: 190px; height: 15px; background: #2196f7; display: flex; font-family: sans-serif; font-size: 10px; font-weight: bold; border-bottom-left-radius: 7px; align-items: center;">
                    <h3 style="margin-left: 10px; font-size: 10px;">Developer | Sistema</h3>
                </span>
               </div>
               <div style="max-width: 400px; height: auto; background: #111425; display: flex; gap: 3px; border-top-left-radius: 10px; border-bottom: 4px solid #2196f7; border-bottom-right-radius: 10px; padding: 10px; position: relative; color: #fff; font-weight: bold; flex-direction: column;">
                 <p style="margin: 0; word-break: break-all;">${dados.msg}</p>
                 <div style="font-size: 10px; align-self: flex-end; margin-top: 5px; opacity: 0.7;">
                     ${dados.data_envio}
                 </div>
              </div>
              </div>`;
         }
            return  `
               <div style="width: auto; display: flex; flex-direction: column; gap: 7px; font-size: 10px; margin-bottom: 15px;">
                <div style="background: #DCF8C6; padding: 5px 7px; font-size: 12px; border-radius: 5px; width: fit-content;">
                    <p style="margin: 0;">${dados.user_name || "user"}</p>
                </div>
                <div style="background: #DCF8C6; padding: 10px; border-radius: 10px; max-width: 400px; word-break: break-all;">
                    <p style="margin: 0;">${dados.msg || ""}</p>
                     <div style="width: auto; height: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px;">${dados.data_envio}</div>
                </div>
               </div> 
            `;

        }).join('');
    } catch (err) {
        console.error("Erro ao buscar mensagens:", err);
    }
}


async function carregarSidebar() {
    try {
        const response = await fetch('http://localhost:5507/tunnek/msg');
        const mensagens = await response.json();
        
        const usuariosUnicos = [...new Map(mensagens.map(m => [m.email_user, m])).values()];
        
        sidebar.innerHTML = "";
        usuariosUnicos.forEach(user => criarCardLateral(user));

        if (!chatCamp.innerHTML.trim()) chatCamp.innerHTML = aviso;
    } catch (e) {
        console.error("Erro ao carregar sidebar:", e);
    }
}

formMsg.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgInput = document.querySelector('#editor-msg');
    
    const data = {
        user_name: localStorage.getItem('userName'),
        email_user: localStorage.getItem('userEmail'),
        msg: msgInput.value
    };

    try {
        await fetch('http://localhost:5507/chat-ss', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        msgInput.value = "";
    } catch (error) {
        console.error("Erro ao enviar:", error);
    }
});

socket.on('nova_mensagem_global', (data) => {
    criarCardLateral(data);
    if (window.conversaAtivaEmail === data.email_user) {
        buscarMensagens();
    }
});

window.onload = carregarSidebar;

const btn = document.querySelector('#send-msg');
const box = document.querySelector('#box');
btn.addEventListener('mouseenter', () => box.classList.add('box-ativa'));
btn.addEventListener('mouseleave', () => box.classList.remove('box-ativa'));

</script>
</body>
</html>
