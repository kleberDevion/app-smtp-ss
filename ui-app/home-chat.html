<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat.ss | ss.com</title>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(71, 71, 71);
        overflow-x: hidden;
        overflow-y: hidden;
        font-family: 'Poppins';
        width: 100vw;
        height: 100vh;
    }

    body::-webkit-scrollbar {
        display: none;
    }

    #topo {
        width: 86%;
        height: 50px;
        background: #111425;
        display: flex;
        position: absolute;
        right: 0;
    }

    #grupos {
        width: 14%;
        height: 100%;
        border: 2px solid #232323;
        display: flex;
        flex-direction: column;
        background: #232323;
        position: absolute;
        gap: 3px;
    }

    #top {
        width: 14%;
        height: 49px;
        background: #111425;
        display: flex;
        border-right: 2px solid #413f3f;
    }

    #footer-editor {
        width: 86%;
        height: 60px;
        background: #232323;
        display: flex;
        position: absolute;
        bottom: 0;
        right: 0;
        flex-direction: row;
        gap: 10px;
        border-left: 1px solid #413f3f;
    }

    #formMsg {
        width: auto;
        height: 100%;
        display: flex;
        align-items: center;
    }

    #editor-msg {
       width: 1500px;
       height: 40px;
       border-radius: 20px;
       padding-left: 20px;
       position: absolute;
       left: 210px;
       outline: none;
       display: flex;
    }

    #chat-camp {
        width: 86%;
        height: 89%;
        display: flex;
        position: absolute;
        right: 0;
        bottom: 60px;
        border: none;
        padding-left: 20px;
        padding-top: 20px;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
        scroll-behavior: auto;
        overflow-y: auto;
    }

    #chat-camp::-webkit-scrollbar {
        display: none;
    }

    #send-msg {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #232323;
        display: flex;
        position: absolute;
        right: 30px;
        align-items: center;
        justify-content: center;
        padding-right: 3px;
        color: #fff;
        cursor: pointer;
    }

    #box {
        width: 50px;
        height: 30px;
        display: flex;
        position: absolute;
        border-top-left-radius: 7px;
        border-bottom-right-radius: 7px;
        border-bottom: 1px solid aqua;
        left: 96.7%;
        bottom: 10px;
        z-index: -1;
        transition: bottom 0.4s ease;
        pointer-events: none;
        transition: all 0.4s ease;
        font-size: 12px;
        align-items: center;
        justify-content: center;
    }

    .box-ativa {
       transform: translateY(-70px);
       color: #fff;
       background: #111425;
    }

    .ops-container {
        width: 200px;
        height: 100px;
        background: #232323;
        border: 1px solid #413f3f;
        border-radius: 5px;
        z-index: 100;
        margin-right: -198px;
        display: none;
        margin-top: 63px;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
    }

    #ops-btn:hover {
       cursor: pointer;
    }

    .btn-delete {
        width: 100%;
        height: 20px;
        border-bottom: 1px solid #413f3f;
        align-items: center;
        padding: 4px;
        display: flex;
        flex-direction: row;
        gap: 5px;
    }
    .btn-delete:hover {
        background-color: #555353;
    }

    #aviso-preencher {
        width: 300px;
        height: 60px;
        background-color: rgb(248, 47, 47);
        display: flex;
        z-index: 1000;
        position: absolute;
        right: -300px;
    }

    #aviso-preencher.aviso {
        display: block;
        transform: translateX(-150px);
    }

    @keyframes moviment {
        to {
            right: -300px;
        } from {
            right: -150px;
        }
    }
    
   
body.error-active > *:not(.not-found) {
    display: none !important;
}

.not-found {
    display: none; 
    background: #111425;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
}

.not-found.aceso {
    display: flex;
}


</style>

     <header id="topo">

     </header>
 
        <div id="aviso-preencher"></div>
        <div id="chat-camp"></div>

        <div id="footer-editor">
            <form id="formMsg">
                <input type="text" id="editor-msg" placeholder="Mandar menssagem..." autocomplete="off">
                <button type="submit" id="send-msg" form="formMsg">
                    <i class="fas fa-paper-plane" style="transform: rotateZ(46deg);"></i>
                </button>
            </form>
        </div>
     <div class="not-found">
        <i class="ri-error-warning-line" style="font-size: 80px; color: #ff4747;"></i>
        <h2 style="margin-top: 20px;">Ops! Algo deu errado.</h2>
        <p>Não conseguimos carregar as mensagens.</p>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px;">Tentar Novamente</button>
    </div>

     <div id="top"></div>
     <nav id="grupos">

     </nav>

<!--fezes-->
<div id="box">
  <div class="title">
    <p>Enviar</p>
  </div>
</div>
<!--fezes-->
<script>

const notPage = document.querySelector('.not-found');

function showNotFound() {
    if (notPage) {
        notPage.classList.add('aceso'); 
        document.body.classList.add('error-active');
    }
}

const socket = io("http://127.0.0.1:5507");
const chatCamp = document.getElementById('chat-camp');
const sidebar = document.getElementById('grupos');
const formMsg = document.getElementById('formMsg');

window.conversaAtivaEmail = localStorage.getItem('conversaAtiva') || null;

const aviso = `
   <div id="aviso" style="color: lime; display: flex; width: auto; height: auto; position: absolute; left: 42%; top: 50%; flex-direction: column; align-items: center; gap: 30px;">
      <i class="ri-chat-check-line" style="font-size: 60px; color: #fff;"></i>
      <p>Selecione uma conversa</p>
   </div>
`;

function criarCardLateral(data) {
    const idUnico = data.email_user.replace(/[@.]/g, '');
    const idDoCard = `popup-${idUnico}`; 

    if (document.getElementById(idDoCard)) return;

    const htmlCard = `
        <div id="${idDoCard}" style="width: 100%; height: 70px; border: 1px solid #535151; padding-left: 8px; background: #232323; display: flex; align-items: center; position: relative; cursor: pointer; margin-bottom: 5px;">
          <div style="width: 50px; height: 50px; border-radius: 50%; border: 1px solid #535151; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-user" style="color: white;"></i>
          </div>
          <div style="margin-left: 10px; color: #fff; font-size: 14px;">${data.user_name}</div>
        </div>
    `;

    sidebar.insertAdjacentHTML('beforeend', htmlCard);

    document.getElementById(idDoCard).onclick = () => {
        window.conversaAtivaEmail = data.email_user;
        localStorage.setItem('conversaAtiva', data.email_user);
        chatCamp.innerHTML = ""; 
        buscarMensagens();
    };
}

async function buscarMensagens() {
    try {
        const response = await fetch('http://localhost:5507/tunnek/msg');

        if (!response.ok || response === null) {
            return showNotFound();
        }

        const resultado = await response.json();

        //if (!Array.isArray(resultado)) return;

        if (!resultado || (Array.isArray(resultado) && resultado.length === 0)) {
            return showNotFound();
        }

        const mensagensFiltradas = resultado.filter(m => {
            return m.email_user === window.conversaAtivaEmail || m.email_destinatario === window.conversaAtivaEmail;
        });

        if (mensagensFiltradas.length === 0) {
            chatCamp.innerHTML = aviso;
            return;
        }

        chatCamp.innerHTML = mensagensFiltradas.map(dados => {
            if (dados.is_dev) {
                return `
                <div id="item${dados.id}" style="width: auto; height: auto; display: flex; gap: 7px; flex-direction: column; margin-bottom: 20px; align-self: flex-start;">
                    <div style="width: 100%; height: auto; background: #111425; border-top: 3px solid #2196f7; display: flex; flex-direction: column; color: #fff; border-bottom-left-radius: 7px; gap: 5px; padding-top: 4px;">
                        <div style="width: 100%; height: 25px; display: flex; flex-direction: row; align-items: center; padding-left: 4px;">
                            <p style="font-weight: bold; color: gold; margin-left: 10px; font-size: 10px;">${dados.user_name}</p>
                            <button type="button" id="ops-btn" onclick="toggleOptions(this)" style="width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; color: #fff; background: #111425; border: none; transform: translateX(auto); margin-left: auto;">
                                <i class="ri-arrow-down-s-line"></i>
                            </button>                            
                            <div class="ops-container" onclick="abrirOps(${dados.id})">
                              <div class="btn-delete">
                                <i class="fas fa-trash"></i>
                                 <p>Deletar menssagem</p>
                              </div>
                            </div>
                        </div>
                        <span style="width: 100%; min-width: 190px; height: 15px; background: #2196f7; display: flex; font-family: sans-serif; font-size: 10px; font-weight: bold; border-bottom-left-radius: 7px; align-items: center;">
                            <h3 style="margin-left: 10px; font-size: 10px;">Developer | Sistema</h3>
                        </span>
                    </div>
                    <div style="max-width: 400px; height: auto; background: #111425; display: flex; gap: 3px; border-top-left-radius: 10px; border-bottom: 4px solid #2196f7; border-bottom-right-radius: 10px; padding: 10px; position: relative; color: #fff; font-weight: bold; flex-direction: column; font-size: 10px;">
                        <p style="margin: 0; word-break: break-all;">${dados.msg}</p>
                        <div style="font-size: 10px; align-self: flex-end; margin-top: 5px; opacity: 0.7;">${dados.data_envio}</div>
                    </div>
                </div>`;
            }
            return `
                <div id="item${dados.id}" style="width: auto; display: flex; flex-direction: column; gap: 7px; font-size: 10px; margin-bottom: 15px;">
                    <div style="width: 100%; background: #DCF8C6; padding: 5px 7px; font-size: 12px; border-radius: 5px;">
                        <p style="margin: 0;">${dados.user_name || "user"}</p>
                    </div>
                    <div style="background: #DCF8C6; padding: 10px; border-radius: 10px; max-width: 400px; word-break: break-all;">
                        <p style="margin: 0;">${dados.msg || ""}</p>
                        <div style="width: auto; height: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px;">${dados.data_envio}</div>
                    </div>
                </div>`;
        }).join('');
        
        chatCamp.scrollTop = chatCamp.scrollHeight;
    } catch (err) {
        console.error("Erro ao buscar mensagens:", err);
        showNotFound();
    }
}

buscarMensagens()

function toggleOptions(btn) {
  const options = btn.nextElementSibling; 
  
  if (options.style.display === "none" || options.style.display === "") {
    options.style.display = "flex";
  } else {
    options.style.display = "none";
  }
}


async function abrirOps(id) {
  try {
    const response = await fetch(`http://localhost:5507/remove/item/${id}`, {
       method: 'DELETE',
       headers: {
         'Content-Type': 'application/json',
         'Authorization': `Bearer ${localStorage.getItem('token_acesso')}`
       },
    });

    const dados = response.json()

    if (!response.ok) {
        alert('Erro ao deletar item.')
    }

    document.getElementById(`item${id}`).remove();

  } catch (error) {
    console.error('Erro:', erro);
    alert(erro.message);
  }
  
}

async function carregarSidebar() {
    try {
        const response = await fetch('http://localhost:5507/tunnek/msg');
        const mensagens = await response.json();
        if (!Array.isArray(mensagens)) return;
        
        const usuariosUnicos = [...new Map(mensagens.map(m => [m.email_user, m])).values()];
        sidebar.innerHTML = "";
        usuariosUnicos.forEach(user => criarCardLateral(user));

        if (window.conversaAtivaEmail) buscarMensagens();
    } catch (e) { console.error(e); }
}

const msgInput = document.getElementById('editor-msg'); 
const alerta = document.getElementById('aviso-preencher');

formMsg.addEventListener('submit', async (e) => {
    e.preventDefault();

    const value = document.querySelector('#editor-msg').value

    if (!value || value.trim() === '') {
        console.log("Erro");
        alerta.classList.add('ativo');
    } else {
        console.log("Sucesso! Conteúdo");
    }

    const data = {
        user_name: localStorage.getItem('userName'),
        email_user: localStorage.getItem('userEmail'),
        email_destinatario: window.conversaAtivaEmail,
        msg: msgInput.value
    };

    try {
        await fetch('http://localhost:5507/chat-ss', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        msgInput.value = "";
    } catch (error) { console.error(error); }
});

socket.on('nova_mensagem_global', (data) => {
    carregarSidebar(); 
    if (window.conversaAtivaEmail === data.email_user || window.conversaAtivaEmail === data.email_destinatario) {
        buscarMensagens();
    }
});

window.onload = carregarSidebar;

const btn = document.querySelector('#send-msg');
const box = document.querySelector('#box');
btn.addEventListener('mouseenter', () => box.classList.add('box-ativa'));
btn.addEventListener('mouseleave', () => box.classList.remove('box-ativa'));

</script>
</body>
</html>
