<html lang="pt-br">
    <head>
        <link rel="manifest" href="./manifest.json">
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
        <link rel="stylesheet" href="style.dashboard.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PAINEL DE CONTROLE</title>
    </head>
    <body>
        <header id="topo">
            <div id="logo-ss">
                <h2 id="titulo">Dashboard</h2>
              <div class="auxilio-logo">
                <img class="logo" src="logo.png">
              </div>
            </div>
            <div id="voltar-home">
                <button id="btn-menu">
                    <i class="fas fa-bars" style="font-size: 25px"></i>
                </button>
            </div>
        </header>
        <div id="menu">
          <div class="logo-system"></div>
          <nav class="logs-server" onclick="passUser()">
          <p class="titulo">
            Visão Geral
            <i class="fas fa-server" style="font-size: 18px; margin-left: 8px; color: #2196f7;"></i>
          </p>
          </nav>
        </div>
        <div class="dados-emails"></div>
        <nav class="navbar">
          <button class="buscar" title="Tras todos os envios.">Buscar</button>
          <button class="home-smtp" title="voltar para home." onclick="redirectUser()">
            <i class="fas fa-home"></i>
          </button>
          <button class="logs-erro" onclick="logsErro()">
            <i class="fas fa-server"></i>
          </button>
          <div id="notifys"></div>
        </nav>
        <script>

function logsErro() {
  window.location.href = './manager.html';
}

function passUser() {
  window.location.href = './resultados-emails.html';
}

function redirectUser() {
  window.location.href = './smtp-envio.html';
}          

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registrado!', reg))
        .catch(err => console.log('Erro ao registrar Service Worker:', err));
    });
  }
          
const btn = document.getElementById("btn-menu");
const menu = document.getElementById("menu");

document.addEventListener('click', (event) => {
  if (!menu.contains(event.target) && !btn.contains(event.target)) {
    menu.classList.remove("aberto");
  }else if (btn.contains(event.target)) {
    menu.classList.toggle("aberto");
  }
});

const conteinerDados = document.querySelector('.dados-emails');
const botaoFetch = document.querySelector('.buscar');

async function buscarDados() {
  try {
    const response = await fetch(`http://localhost:5500/api/buscar/envios?t=${Date.now()}`, {
      method: 'GET',
      headers: { 
        'Content-Type': 'application/json',
        'Cache-Control': 'no-cache'
      },
    });

    if (response.status === 404) { alert('Dados não encontrados.'); return; }
    if (response.status === 500) { alert('Erro no servidor 500.'); return; }

    const resultado = await response.json();

    const lista = Array.isArray(resultado) ? resultado : [resultado];

    if (lista.length === 0) {
      conteinerDados.innerHTML = `
      <div style="width: auto; height: 40px; display: flex; justify-content: center; align-items: center; flex-direction: row; gap: 20px; margin: auto;margin-top: auto;">
        <p style="margin: auto;margin-top: auto;">Nada aqui por enquanto.
          <i class="ri-mail-send-line" style="font-size: 35px; display: flex; position: absolute; transform: translate(87px, -70px); color: #2196f7;"></i>
        </p>
      </div>
      `;
      return;
    }

    const htmlContent = lista.map(dados => `
      <div id="item-${dados.id}" style="display:flex;flex-direction:column;width:100%;height:auto;gap:0;background:#f8f9fb;font-family:'Segoe UI',sans-serif;margin-bottom:0px;">
      <div style="width:100%;height:auto;border:1px solid #e2e6ea;display:flex;flex-direction:column;gap:0;background:#ffffff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
      <div style="background:whitesmoke;padding:12px 18px;display:flex;align-items:center;gap:8px;">
      <span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;"></span>
      <span style="color:#a0aec0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;">SMTP · Dados do Envio</span>    </div>
      <div style="padding:16px 18px;display:flex;flex-direction:column;gap:10px;">
      <p style="margin:0;font-size:13px;color:#6b7280;">
        <span style="color:#9ca3af;font-weight:500;">Remetente</span><br>
        <span style="color:#111827;font-weight:600;">${dados.nome || '—'}</span>
        <span style="color:#6b7280;"> &lt;${dados.remetente || '—'}&gt;</span>
      </p>
      <p style="margin:0;font-size:13px;color:#6b7280;">
        <span style="color:#9ca3af;font-weight:500;">Data do envio</span><br>
        <span style="color:#111827;font-weight:600;">${dados.data_envio || '—'}</span>
      </p>
      <div style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:10px 14px;">
        <p style="margin:0;font-size:13px;">
          <span style="color:#9ca3af;font-weight:500;">Destinatário</span><br>
          <span style="color:#111827;font-weight:600;">${dados.destinatario || '—'}</span>
          <button class="btn-delete" style="cursor:pointer;background:#2196f3;color:#ffffff;border:none;border-radius:4px;padding:6px 12px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;margin-left:auto;" data-id="${dados.id}">Excluir</button>        
        </p>
      </div>
    </div>
  </div>
    `).join('');

    conteinerDados.innerHTML = htmlContent;

  } catch (error) {
    console.error('Erro na requisição:', error);
  }
}

botaoFetch.addEventListener('click', buscarDados);

const conteinerDados2 = document.querySelector('.dados-emails');
conteinerDados2.addEventListener('click', async (e) => {
  if (e.target.classList.contains('btn-delete')) {
    const id = e.target.dataset.id;
    await deletarItem(id);
  }
});

window.onload = buscarDados;
botaoFetch.onclick = buscarDados;

setInterval(buscarDados, 5000);

async function deletarItem(id) {

  try {
    const resposta = await fetch(`http://localhost:5500/api/deletar/${id}`, {
      method: 'DELETE'
    });
    

    if (!resposta.ok) {
      throw new Error('Servidor recusou o delete. Verifique o Back-end!');
    }

    const elemento = document.getElementById(`item-${id}`);
    if (elemento) {
      elemento.remove();
      console.log('Sumindo da tela o item:', id);
    } else {
      console.warn('Não achei na tela a div com id: item-' + id);
    }

  } catch (erro) {
    console.error('Erro:', erro);
    alert('Erro ao deletar: ' + erro.message);
  }

}

const token = localStorage.getItem('token_acesso');

if (!token) {
    alert("Acesso negado! Faça login primeiro.");
    window.location.href = "./redirect.html";
}

        </script>
    </body>
</html>
