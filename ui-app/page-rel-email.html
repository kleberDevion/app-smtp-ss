<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin SS | Login</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    background: #111425;
    overflow-x: hidden;
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 30px;
    font-family: 'Poppins';
}

#formLogin {
  width: 500px;
  height: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  transform: translateY(70px);
}

input {
  width: 300px;
  height: 50px;
  border-radius: 7px;
  border: 1px solid #ccc;
  padding-left: 20px;
  background: #232323;
  outline: none;
  font-weight: bold;
  color: #fff;
}

input:hover {
  background: #dbdbdb;
  color: #000;
}

#btn-sender {
  width: 140px;
  height: 50px;
  border: none;
  border-radius: 10px;
  display: flex;
  transform: translateY(50px);
  align-items: center;
  justify-content: center;
  font-size: 17px;
}

#redirect-problem {
  color: #2196f7;
  z-index: 1000;
  display: flex;
  font-weight: bold;
  font-size: 14px;
}

#seila {
  width: 500px;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transform: translateY(100px);
}

</style>
<body>

  <form id="formLogin">
    <input type="text" id="nome" placeholder="Login" autocomplete="off">
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha" autocomplete="off">
    <button type="button" id="btn-sender" form="formLogin">
      <h5>Logar</h5>
    </button>
  <div id="seila">
    <h5 style="color: #fff;">Problemas com login ??</h5>
    <a href="./relatar-problema.html" id="redirect-problem">Clique aqui</a>
  </div>
  </form>  
<script>
const btn = document.getElementById('btn-sender');

btn.addEventListener('click', async () => {
    
    const payload = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value
    };

    try {
        const resposta = await fetch('http://localhost:5500/ss/login/admin', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const dados = await resposta.json();

        console.log('Sucesso:', dados);
    } catch (erro) {
        console.error('Erro ao enviar:', erro);
    }
});

</script>
</body>
</html>
