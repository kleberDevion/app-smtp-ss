<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login - Entre em nosso serviço</title>
</head>
<body>
   <div class="acople-form">
      <form id="formlogin">
        
        <label for="name">Nome de login</label>
        <input type="text" id="nome" name="user-name">

        <label for="keyword">Senha de acesso</label>
        <input type="password" id="senha" keyword="user-password" autocomplete="off">

        <label name="mail">Seu email</label>
        <input type="email" id="email" name="mail" autocomplete="on">

        <button type="submit" form="formlogin" class="sender-btn">
            Entrar
            <i class="fas fa-user"></i>
        </button>
        <p class="criar-conta">Nao tem uma conta ?, <a href="./criarUser.html" style=" color: aqua;font-size: 17px;font-weight: bold;display: flex;align-items: center;justify-content: center;cursor: pointer;">crie uma.</a></p>
      </form>
   </div>
   <div class="img-ss">
     <div class="logo"></div>
    <div class="introducao">
        <h2 id="s-crie">Acesse sua conta</h2>
        <h4 id="s-text">para usar nosso serviço</h4>
    </div>
     <div class="img"></div>
      <div class="circle"></div>
   </div>
   <script>

const formLogin = document.querySelector('#formlogin');

formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    nome: document.querySelector('#nome').value,
    senha: document.querySelector('#senha').value,
    email: document.querySelector('#email').value
  };

  const response = await fetch('http://localhost:5500/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

const result = await response.json();

if (response.ok) {
    localStorage.setItem('token_acesso', result.token);
    localStorage.setItem('userName', result.nome); 
    localStorage.setItem('userEmail', result.email);
    alert('Logado com sucesso!');
    window.location.href = 'smtp-envio.html';
}

});

   </script>
</body>
</html>
