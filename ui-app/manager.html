<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <link rel="stylesheet" href="manegerLogs.css">
    <title>Page Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  </head>
  <body>
    <header class="topo">
        <div class="logo-maneger"></div>
        <h5>Logs manager</h5>
        <button class="ir-ate-dash" title="Ir para o dashboard" onclick="redirectUserDash()">
            <i class="fas fa-chart-line" style="font-size: 20px; color: #2196f7;"></i>
        </button>
        <button class="ir-ate-visao-geral" title="Ir para o painel de visao geral" onclick="redirectUserGeral()">
            <i class="fas fa-filter" style="font-size: 20px; color: #2196f7;"></i>
        </button>
        <button class="barra-lateral" title="Navegaçao facil">
            <i class="fas fa-bars" style="font-size: 20px; color: #2196f7;"></i>
        </button>
        <div class="menu-ease" onclick="abrirModal()"></div>
    </header>
      <div class="logs-ids">
        
      </div>
    <script>

        function redirectUserDash() {
            window.location.href = './dashboard.html'
        }

        function redirectUserGeral() {
            window.location.href =  './resultados-emails.html'
        }

        const menu_ease = document.querySelector('.menu-ease');

        menu_ease.addEventListener('click', () => {
            menu_ease.classList.toggle("aberto");
        });

        const btn = document.querySelector('.barra-lateral');
        const modal = document.querySelector('.menu-ease');

document.addEventListener('click', (event) => {
  if (!modal.contains(event.target) && !btn.contains(event.target)) {
    modal.classList.remove("aberto");
  }else if (btn.contains(event.target)) {
    modal.classList.toggle("aberto");
  }
});

async function chamarDadosErroId() {
    try {
        const response = await fetch('http://localhost:5500/api/trazer/logs_erro');
        const dados = await response.json();   
        const container = document.querySelector('.logs-ids');

        const lista = Array.isArray(dados) ? dados : [dados];

        if (lista.length === 0 || !dados[0].id) {
            container.innerHTML = `
               <div style="width: auto; height: 40px; display: flex; justify-content: center; align-items: center; flex-direction: row; gap: 20px; margin: auto;margin-top: 500px;">
                 <p style="margin: auto;margin-top: auto;">Nenhum dado encontrado.
                 <i class="fas fa-folder-open" style="font-size: 25px; color: #ccc;"></i>
                </p>
               </div>
             `;
            return;
         }
        
        container.innerHTML = lista.map(item =>  `
            <div id="item-${item.id}" style="width: 100%; height: 97px; display: flex; background: #fff; border-bottom: 1px solid #ccc; flex-direction: column; gap: 48px;">
            <div class="acople" style="display: flex; flex-direction: row; gap: 10px; width: 100%; height: 20px; background: whitesmoke; border: 1px solid #ccc; padding: 0; margin: 0; box-sizing: border-box;">
            <span class="status" style="width: auto; background: whitesmoke; font-size: 12px; color: #ccc; padding-left: 8px; padding-top: 3px; padding-right: 20px; box-sizing: border-box;"><strong>Envio falho</strong></span>
            </div>
            <div style="width: 100%; height: 53px; display: flex; flex-direction: row; gap: 5px; position: relative; left: 10px; padding: 0; margin: 0; box-sizing: border-box;">
            <div style="width: auto; height: 20px; background: whitesmoke; border-radius: 5px; left: 10px; font-size: 10px; padding-left: 10px; padding-right: 10px; align-content: center;">${item.tipo_erro || '-'}</div>
            <div style="width: auto; height: 20px; background: whitesmoke; border-radius: 5px; font-size: 10px; padding-left: 10px; padding-right: 10px; align-content: center;">${item.mensagem || '-'}</div>
            <div style="width: auto; height: 20px; background: whitesmoke; border-radius: 5px; font-size: 10px; padding-left: 10px; padding-right: 10px; align-content: center;">${item.remetente || "Nada aqui.."}</div>
            <div style="width: auto; height: 20px; background: whitesmoke; border-radius: 5px; left: 10px; font-size: 10px; padding-left: 10px; padding-right: 10px; align-content: center; ">${item.data_hora || "Nada aqui.."}</div>
            <button style="width:50px;height:30px;cursor:pointer;background:#2196f3;color:#ffffff;border:none;border-radius:4px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;position:absolute;right:50px; bottom:10px;align-content:center; padding: 6px;" onclick="deletarItem(${item.id})">Deletar</div>          
             </div>
            </div>
        `).join('');

    } catch (erro) {
        console.error('Erro ao buscar contador:', erro);
        const el = document.querySelector('.sucessos-emails');
        if (el) el.innerHTML = '<p>Erro ao carregar dados</p>';
    }
}

async function deletarItem(id) {
  try {
    const resposta = await fetch(`http://localhost:5500/api/deletar/falhas/${id}`, {
      method: 'DELETE',
      headers: {
        'Content-Type': 'application/json'
      }
    });

    const dados = await resposta.json();

    if (!resposta.ok) {
      throw new Error(dados.erro || 'Erro ao deletar');
    }

    console.log(dados.mensagem);
    document.getElementById(`item-${id}`).remove();

  } catch (erro) {
    console.error('Erro:', erro);
    alert(erro.message);
  }
}


window.onload = () => {
   chamarDadosErroId();
}

    </script>
  </body>
</html>
